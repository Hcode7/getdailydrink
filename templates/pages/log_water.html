{% extends 'core/base.html' %}
{% load static %}

{% block content %}

<div class="container">

  <!-- Background Section -->
  <div class="background">

    <!-- Water Intake Form -->
    <form class="questions-container" method="POST" id="water-form">
        {% csrf_token %}

        <div class="question-group">
          <label for="gender">What is your gender?</label>
          <br><br>
          {{ form.gender }}
        </div>
      
        <div class="question-group">
          <label for="age">What is your age?</label>
          <br><br>
          {{ form.age }}
        </div>
      
        <div class="question-group">
          <label for="activity-level">What is your activity level?</label>
          <br><br>
          {{ form.activity_level }}
        </div>
      
        <div class="question-group">
          <label for="climate">What is the climate like where you live?</label>
          <br><br>
          {{ form.climate }}
        </div>
      
        <div class="question-group">
          <label for="weight">What is your weight (in kg)?</label>
          <br><br>
          {{ form.weight }}
        </div>
      
        <div class="question-group" style="z-index: 1;">
          <label for="health-conditions">Do you have any health conditions?</label>
          <br><br>
          {{ form.health_conditions }}
        </div>

        <div class="question-group">
          <label for="reminder-interval">How often do you want a reminder?</label>
          <br><br>
          <select id="reminder-interval" name="email_frequency">
              <option value="1">Every 1 hour</option>
              <option value="2">Every 2 hours</option>
              <option value="3">Every 4 hours</option>
              <option value="5">Every 6 hours</option>
              <option value="5">Every 12 hours</option>
              <option value="5">Every one day</option>
          </select>
        </div>
        
        <!-- Reminder Button (Doesn't submit form) -->
        <button type="submit" class="btn" onclick="startWaterReminder()">Start Reminder</button>
        
        <!-- Submit Button -->
        <button type="submit" class="btn">Submit</button>
    </form>
      
  </div>
</div>

<script>
  function startWaterReminder() {
      let interval = document.getElementById("reminder-interval").value;
      alert(`Water reminder set for every ${interval} hour(s)!`);
      
      // Example: Setting a simple JS timeout (you may use Notification API)
      setInterval(() => {
          alert("Time to drink water! 💧");
      }, interval * 60 * 60 * 1000); // Convert hours to milliseconds
  }
</script>

{% endblock content %}
